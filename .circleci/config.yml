version: 2.1

jobs:
  playwright-tests:
    docker:
      # Official Playwright image includes browsers and required OS dependencies.
      - image: mcr.microsoft.com/playwright:v1.56.1-noble
    working_directory: ~/project
    steps:
      - checkout

      - restore_cache:
          keys:
            - npm-cache-v1-{{ checksum "package-lock.json" }}
            - npm-cache-v1-

      - run:
          name: Install dependencies
          command: npm ci

      - save_cache:
          key: npm-cache-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

      - run:
          name: TypeScript validation
          command: npm run lint

      - run:
          name: Run Playwright tests
          command: npm test

      - store_test_results:
          path: test-results

      - store_artifacts:
          path: playwright-report
          destination: playwright-report

      - store_artifacts:
          path: test-results
          destination: test-results

workflows:
  pull-request-tests:
    jobs:
      - playwright-tests
